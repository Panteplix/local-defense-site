<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Local Defense - Login</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .oauth-buttons {
      display: flex;
      gap: 10px;
      margin-top: 15px;
      flex-wrap: wrap;
    }
    
    .oauth-btn {
      flex: 1;
      min-width: 120px;
      padding: 10px;
      border: none;
      border-radius: 5px;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: transform 0.2s;
    }
    
    .oauth-btn:hover {
      transform: scale(1.05);
    }
    
    .discord-btn {
      background-color: #5865F2;
      color: white;
    }
    
    .discord-btn:hover {
      background-color: #4752C4;
    }
    
    .google-btn {
      background-color: #fff;
      color: #333;
      border: 1px solid #ddd;
    }
    
    .google-btn:hover {
      background-color: #f5f5f5;
    }
    
    .divider {
      text-align: center;
      margin: 20px 0;
      color: #999;
    }
    
    .divider::before,
    .divider::after {
      content: '';
      display: inline-block;
      width: 45%;
      height: 1px;
      background: #ddd;
      vertical-align: middle;
    }
    
    .divider::before {
      margin-right: 10px;
    }
    
    .divider::after {
      margin-left: 10px;
    }

    .options-menu {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px;
      margin: 25px 0;
      max-width: 500px;
      margin-left: auto;
      margin-right: auto;
    }

    .option-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 15px;
      background: linear-gradient(135deg, rgba(30, 45, 70, 0.7) 0%, rgba(20, 30, 50, 0.9) 100%);
      border: 2px solid #8f6b2f;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
      color: #67b7ff;
      font-size: 0.95em;
    }

    .option-card:hover {
      background: linear-gradient(135deg, rgba(50, 70, 100, 0.8) 0%, rgba(35, 50, 75, 1) 100%);
      border-color: #f5d77a;
      box-shadow: 0 8px 20px rgba(245, 215, 122, 0.3), inset 0 0 15px rgba(245, 215, 122, 0.1);
      transform: translateY(-3px);
      color: #f5d77a;
    }

    .option-card i {
      font-size: 1.8em;
      margin-bottom: 8px;
      color: inherit;
    }

    .admin-section,
    .officer-section {
      margin-top: 30px;
      padding: 15px;
      background: rgba(103, 183, 255, 0.1);
      border-left: 3px solid #f5d77a;
      border-radius: 4px;
    }

    .admin-section p,
    .officer-section p {
      margin: 8px 0;
      color: #a0b8d8;
      font-size: 0.9em;
    }
  </style>
</head>
<body>

  <header>
    <h1>Local Defense</h1>
    <p>Warmane Onyxia Guild</p>

    <nav>
      <a href="index.html"><i class="fas fa-home"></i> Home</a>
      <a href="raids.html"><i class="fas fa-sword"></i> Raid Sign Ups</a>
      <a href="builds.html"><i class="fas fa-tools"></i> Guides</a>
      <a href="armory.html"><i class="fas fa-search"></i> Armory</a>
      <a href="login.html" class="active"><i class="fas fa-sign-in-alt"></i> Login</a>
    </nav>
  </header>

  <!-- 🔮 WoW Quote Popup -->
  <div id="wowQuotePopup" class="wow-quote-popup hidden">
    <div class="wow-quote-card">
      <button id="closeQuotePopup" class="close-quote-btn" aria-label="Close quote popup">✕</button>

      <div class="quote-card-top"></div>

      <div class="wow-quote-inner">
        <div class="quote-scroll">
          <div id="wowQuoteText" class="quote-text"></div>
          <div id="wowQuoteSpeaker" class="quote-speaker"></div>
        </div>
      </div>

      <div class="quote-card-bottom"></div>
    </div>
  </div>

  <main class="page-content">
    <section class="signup-section">

      <!-- GUEST PANEL: Login & Register Forms -->
      <div id="guestPanel">
        <h2>Guild Login</h2>
        <p>Login to access member features.</p>

        <form id="loginForm" class="signup-form">
          <input type="text" id="username" placeholder="Username" required />
          <input type="password" id="password" placeholder="Password" required />
          <button type="submit">Login</button>
        </form>

        <p id="loginMessage" class="empty-message"></p>

        <div class="divider">New User? Register Below</div>

        <form id="registerForm" class="signup-form">
          <input type="text" id="registerUsername" placeholder="Choose Username" required />
          <input type="password" id="registerPassword" placeholder="Choose Password" required />
          <button type="button" id="registerBtn">Register</button>
        </form>

        <p id="registerMessage" class="empty-message"></p>

        <div style="margin-top: 20px; padding: 12px; background: rgba(103, 183, 255, 0.1); border-left: 3px solid #67b7ff; font-size: 0.9em; color: #a0b8d8; border-radius: 4px;">
          <strong>℘ Beta Notice:</strong> New accounts are created as <strong>Member</strong>. Officer and Admin ranks are assigned manually by guild leadership.
        </div>

        <div class="divider">OR</div>

        <div class="oauth-buttons">
          <button class="oauth-btn discord-btn" id="discordLoginBtn">
            <i class="fab fa-discord"></i> Discord Login
          </button>
          <button class="oauth-btn google-btn" id="googleLoginBtn">
            <i class="fab fa-google"></i> Google Login
          </button>
        </div>
      </div>

      <!-- LOGGED-IN PANEL: Dashboard View -->
      <div id="loggedInPanel" style="display: none;">
        <h2 id="welcomeMessage" style="margin-top: 0; color: #f5d77a;"></h2>
        <p id="roleMessage" style="color: #a0b8d8; font-size: 1.05em; margin-bottom: 20px;"></p>

        <p style="color: #8f6b2f; font-size: 0.9em; text-transform: uppercase; letter-spacing: 1px;">Quick Access</p>

        <div id="optionsMenu" class="options-menu"></div>

        <div id="rolePanel" class="role-panel"></div>

        <div style="margin-top: 30px; text-align: center;">
          <button id="logoutBtn" style="background: linear-gradient(180deg, #6b1f1f 0%, #401212 100%); color: #f8eaea; border: 1px solid #a84a4a;">
            Logout
          </button>
        </div>
      </div>

    </section>
  </main>

  <script src="login.js"></script>
  <script src="script.js"></script>
</body>
</html>
